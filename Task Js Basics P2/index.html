<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">

</head>

<body>
<main class="bg-danger-subtle">
    <h2 class="text-info text-center px-1 py-1">Please Enter Your Data Here!</h2>
    <form class="py-2 px-2 d-flex flex-column align-items-center gap-3">
        <input type="text" id="lname" name="lname" placeholder="Name" class="form-control w-50">
        <input type="text" id="work" name="work" placeholder="Work" class="form-control w-50">
        <input type="number" id="age" name="age" placeholder="Age" class="form-control w-50">
        <input type="submit" id="submit" value="Submit" class="btn btn-info text-white rounded-pill">
    </form>
</main>

    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/main.js"></script>
</body>

</html>
